<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site.description }}">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="branding">
          <h1 class="site-title"><a href="{{ '/' | relative_url }}">STLViewer</a></h1>
          <p class="site-tagline">{{ site.description }}</p>
        </div>
        <nav class="header-actions">
          <a href="https://github.com/{{ site.repository }}/releases/latest" class="btn btn-primary">Download</a>
          <a href="https://github.com/{{ site.repository }}" class="btn btn-secondary">
            <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            GitHub
          </a>
        </nav>
      </div>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        STLViewer is maintained by <a href="https://github.com/{{ site.author.github }}">{{ site.author.name }}</a>
        &mdash; <a href="https://github.com/{{ site.repository }}">View on GitHub</a>
        &mdash; Released under the <a href="https://github.com/{{ site.repository }}/blob/master/LICENSE">MIT License</a>
      </p>
    </div>
  </footer>
</body>
</html>
